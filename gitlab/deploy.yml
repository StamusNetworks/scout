
refresh-app-of-apps:
  stage: deploy
  needs:
    - docker
  variables:
    APP: scout
    ACTION: update
    BRANCH: $CI_COMMIT_REF_NAME
    SHA: $CI_COMMIT_SHORT_SHA
    PROJECT: $CI_PROJECT_NAME
    NAMESPACE: $CI_PROJECT_NAMESPACE
    SLUG: $CI_PROJECT_PATH_SLUG
  trigger:
    project: devel/devops/app-of-app
    strategy: depend
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    url: https://scout.$CI_COMMIT_REF_NAME.$CI_PROJECT_PATH_SLUG.stamus-networks.net
    on_stop: delete-env-from-app-of-apps
  rules:
    - if: $UPSTREAM_NAME == "nightly_build"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

delete-env-from-app-of-apps:
  stage: deploy
  variables:
    APP: scout
    ACTION: delete
    BRANCH: $CI_COMMIT_REF_NAME
    SHA: $CI_COMMIT_SHORT_SHA
    PROJECT: $CI_PROJECT_NAME
    NAMESPACE: $CI_PROJECT_NAMESPACE
    SLUG: $CI_PROJECT_PATH_SLUG
  trigger:
    project: devel/devops/app-of-app
    strategy: depend
  needs:
    - refresh-app-of-apps
  when: manual
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    action: stop
  rules:
    - if: $UPSTREAM_NAME == "nightly_build"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

stamus-install-archive:
  stage: deploy
  variables:
    APP: scout
  image: kroniak/ssh-client
  needs:
    - build-artifacts
  script:
    # Pass the package to stamus-install
    - echo "$CI_COMMIT_REF_NAME" | grep -q "^stamus-\([0-9.]*\)-" || exit 0
    - export UPGRADE_NO="$(echo "$CI_COMMIT_REF_NAME" | sed -e "s/^stamus-\([0-9.]*\)-.*/\1/")"
    - mkdir /root/.ssh/
    - eval $(ssh-agent -s)
    # Add the SSH key stored in SSH_PRIVATE_KEY variable to the agent store
    - ssh-add <(echo "$SSH_PRIVATE_KEY")
    - ssh-keyscan -H "$GITLAB_RUNNER" > /root/.ssh/known_hosts
    - ssh gitlab@"$GITLAB_RUNNER" mkdir -p "/home/gitlab/packages/$APP/$UPGRADE_NO/tags"
    - scp -r "$CI_PROJECT_DIR/dist" gitlab@"$GITLAB_RUNNER":"/home/gitlab/packages/$APP/$UPGRADE_NO/tags"
  rules:
    - if: '$CI_COMMIT_TAG'
