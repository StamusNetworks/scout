name: CI Pipeline

on:
  push:


env:
  PNPM_VERSION: '9.15.2'

jobs:
  # Code Quality Stage
  linting:
    name: Linting
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm i -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm i -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm check

  # Unit Tests Stage
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm i -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  # Build Stage
  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [linting, typescript, unit-tests]
    container:
      image: node:24-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.26.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build --base=/preview/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.ref_name }}-${{ github.sha }}
          path: dist
          retention-days: 7

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [linting, typescript, unit-tests]
    # Skip on workflow_dispatch events (equivalent to UPSTREAM_NAME != "nightly_build")
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Note: Deploy stage jobs are environment-specific and use GitLab-specific features.
  # These jobs trigger external pipelines and manage review environments.
  # You'll need to implement deployment using GitHub Actions deployment workflows
  # or integrate with your deployment platform (e.g., ArgoCD, Kubernetes, etc.).
  #
  # Original GitLab deploy jobs:
  # - refresh-app-of-apps: Deploys to review environment
  # - delete-env-from-app-of-apps: Cleanup review environment (manual)
  #
  # For GitHub Actions, consider:
  # - Using GitHub Environments for review apps
  # - Using deployment actions specific to your platform
  # - Creating separate workflow files for deployment
