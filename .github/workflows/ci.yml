name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

env:
  PNPM_VERSION: '9.15.2'

jobs:
  # Code Quality Stage
  linting:
    name: Linting
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm i -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm i -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm check

  # Unit Tests Stage
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: node:24-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm i -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  # Build Stage
  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [linting, typescript, unit-tests]
    container:
      image: node:24-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.26.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build --base=/preview/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.ref_name }}-${{ github.sha }}
          path: dist
          retention-days: 7

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [linting, typescript, unit-tests]
    # Skip on workflow_dispatch events (equivalent to UPSTREAM_NAME != "nightly_build")
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # End-to-End Tests Stage
  e2e-deeplinks:
    name: E2E Tests - Deeplinks
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name != 'workflow_dispatch'
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
    services:
      backend:
        image: git.stamus-networks.com:4567/devel/dev/front-end/scirius-fake:main
        # Note: You may need to provide credentials for this private image
        # credentials:
        #   username: ${{ secrets.REGISTRY_USERNAME }}
        #   password: ${{ secrets.REGISTRY_PASSWORD }}
      frontend:
        image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ github.sha }}
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          APP_API_URL: http://backend:3000
    env:
      APP_URL: http://frontend:80
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: codecept
        run: npm install --frozen-lockfile

      - name: Run E2E tests
        working-directory: codecept
        run: HEADLESS=true npx codeceptjs run --grep @deeplinks

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            codecept/screenshots/
            codecept/videos/
            codecept/output/
          retention-days: 3

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: codecept/output/*.xml

  # Note: Deploy stage jobs are environment-specific and use GitLab-specific features.
  # These jobs trigger external pipelines and manage review environments.
  # You'll need to implement deployment using GitHub Actions deployment workflows
  # or integrate with your deployment platform (e.g., ArgoCD, Kubernetes, etc.).
  #
  # Original GitLab deploy jobs:
  # - refresh-app-of-apps: Deploys to review environment
  # - delete-env-from-app-of-apps: Cleanup review environment (manual)
  #
  # For GitHub Actions, consider:
  # - Using GitHub Environments for review apps
  # - Using deployment actions specific to your platform
  # - Creating separate workflow files for deployment
